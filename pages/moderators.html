<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Moderators Page</title>
	<link rel="stylesheet" href="../style/style.css">
	<link rel="stylesheet" href="../style/moderators.css">
</head>

<body>
	<div class="root">
		<div class="sidebar">
			<span>Admin Panel</span>
			<nav>
				<a href="./dashboard.html">dashboard</a>
				<a href="./products.html">product</a>
				<a href="./orders.html">orders</a>
				<a href="./clients.html">clients</a>
				<a href="./comments.html">comments</a>
				<a href="./moderators.html" class="active">moderators</a>
			</nav>
			<button class="logout-btn"> log </button>
		</div>


		<main>
			<div class="moderators__page-top">
				<h1>Moderators Page</h1>
				<button class="new__moder" id="open-modal">+ New Moder</button>
			</div>

			<table class="moderators__list">
				<thead>
					<tr>
						<td>Імя та Прізвище</td>
						<td>Роль</td>
						<td>Телефон</td>
						<td>Пошта</td>
						<td>Логін</td>
						<td>Пароль</td>
						<td>Дата створення</td>
						<td>Управління</td>
					</tr>
				</thead>
				<tbody>

				</tbody>
			</table>
		</main>
	</div>
	<div class="modal">

		<div class="modal__window">

			<div class="modal__content">

				<h2>Product Page</h2>

				<div class="modal__content-box">

					<form>
						<div class="form__wrapper">
							<div class="custom-field">
								<label for="inp-name">Name</label>
								<input type="text" id="inp-name">
							</div>

							<div class="custom-field">
								<label for="inp-lastname">lastname</label>
								<input type="text" id="inp-lastname">
							</div>

							<div class="custom-field">
								<label for="inp-role">role</label>
								<input type="text" id="inp-role">
							</div>

							<div class="custom-field">
								<label for="inp-phone">phone</label>
								<input type="text" id="inp-phone">
							</div>

							<div class="custom-field">
								<label for="inp-email">email</label>
								<input type="text" id="inp-email">
							</div>

							<div class="custom-field">
								<label for="inp-login">login</label>
								<input type="text" id="inp-login">
							</div>

							<div class="custom-field">
								<label for="inp-password">password</label>
								<input type="text" id="inp-password">
							</div>

						</div>

						<button id="send-form" class="btn">Save admin</button>
					</form>

				</div>
			</div>

			<button class="btn-modal-close">
				&#10006;
			</button>
		</div>
	</div>
	<div class="big__loader">
		Загруження...
	</div>
	<script type="module" src="../script/moderators.js"></script>

</body>

</html>
